<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons — cascading sizes so every browser / device picks the
         best one. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- iOS home-screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA manifest (must be in <head> and referenced with the right
         rel + type so Chrome / Edge / Samsung / Firefox light it up.) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#D98A2B" />
    <meta name="background-color" content="#FBF7F0" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="IYF SYLHET" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="IYF SYLHET" />
    <meta name="format-detection" content="telephone=no" />

    <title>ISKCON Youth Forum, Sylhet — A home for young devotees</title>
    <meta
      name="description"
      content="ISKCON Youth Forum, Sylhet — Sri Sri Radha Madhava Mandir, Jugaltila, Kajalshah. Daily darshan, festivals, the Be SMART course, and youth community at the heart of Sylhet."
    />
    <link rel="canonical" href="https://iyfsylhet.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ISKCON Youth Forum, Sylhet" />
    <meta
      property="og:description"
      content="A home for young people to learn, chant, and grow together in Krishna consciousness — at Sri Sri Radha Madhava Mandir, Sylhet."
    />
    <meta property="og:image" content="/og-cover.jpg" />
    <meta property="og:url" content="https://iyfsylhet.org/" />
    <meta property="og:site_name" content="ISKCON Youth Forum, Sylhet" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ISKCON Youth Forum, Sylhet" />
    <meta
      name="twitter:description"
      content="A home for young devotees at Sri Sri Radha Madhava Mandir, Sylhet."
    />

    <!-- Preconnects for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  </body>
</html>
