<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons — cascading sizes so every browser / device picks the
         best one. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- iOS home-screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA manifest (must be in <head> and referenced with the right
         rel + type so Chrome / Edge / Samsung / Firefox light it up.) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#D98A2B" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F0D13" media="(prefers-color-scheme: dark)" />
    <meta name="background-color" content="#FBF7F0" media="(prefers-color-scheme: light)" />
    <meta name="background-color" content="#0F0D13" media="(prefers-color-scheme: dark)" />

    <!-- No-flash theme bootstrap: read localStorage + system preference,
         apply .dark to <html> before React hydrates. Idempotent and tiny.
         Default theme is dark — first-time visitors land on dark, and
         they only switch to light by clicking the toggle (which writes
         localStorage and overrides this script). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('iyf-theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          // Default = dark for both branches unless the user has saved
          // an explicit 'light' choice.
          var theme = (saved === 'light' || saved === 'dark')
            ? saved
            : (prefersDark ? 'dark' : 'dark');
          var root = document.documentElement;
          if (theme === 'dark') {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
          root.setAttribute('data-theme', theme);
          root.style.colorScheme = theme;
        } catch (e) {
          /* localStorage blocked — apply dark fallback */
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="IYF SYLHET" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="IYF SYLHET" />
    <meta name="format-detection" content="telephone=no" />

    <title>ISKCON Youth Forum, Sylhet — A home for young devotees</title>
    <meta
      name="description"
      content="ISKCON Youth Forum, Sylhet — Sri Sri Radha Madhava Mandir, Jugaltila, Kajalshah. Daily darshan, festivals, the Be SMART course, and youth community at the heart of Sylhet."
    />
    <link rel="canonical" href="https://iyf-web-six.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ISKCON Youth Forum, Sylhet" />
    <meta
      property="og:description"
      content="A home for young people to learn, chant, and grow together in Krishna consciousness — at Sri Sri Radha Madhava Mandir, Sylhet." />
    <meta property="og:image" content="/little-1.jpg" />
    <meta property="og:url" content="https://iyf-web-six.vercel.app/" />
    <meta property="og:site_name" content="ISKCON Youth Forum, Sylhet" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ISKCON Youth Forum, Sylhet" />
    <meta
      name="twitter:description"
      content="A home for young devotees at Sri Sri Radha Madhava Mandir, Sylhet."
    />

    <!-- Preconnects for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Pinyon+Script&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
